<!-- Slide component: Soirée / gala detail ("ATLAS CAPITAL GALA — TANGER SPIRIT") — text left, single image right -->
<div class="slide relative w-[1920px] h-[1080px] overflow-hidden bg-[var(--color-background)]" style="font-family: var(--font-body);">

  <!-- Right: single full-bleed image -->
  <img src="{{#if image}}{{image}}{{else}}assets/placeholder-image.svg{{/if}}" alt="{{name}}" data-field="soiree-image"
       class="absolute top-0 right-0 h-[1080px] w-[960px] object-cover z-0">

  <!-- Title -->
  <div class="absolute left-[78px] top-[40px] w-[580px] h-[3px] bg-[var(--color-text-primary)] z-10"></div>
  <img src="assets/outline_colored.webp" alt="" class="absolute left-[78px] top-[145px] w-56 h-12 object-contain z-0">
  <h1 class="absolute left-[78px] top-[56px] z-10 text-5xl font-bold leading-[1.12]" style="font-family: var(--font-heading);">
    <span class="text-[var(--brand-primary)]" data-field="soiree-name">{{name}}</span><br>
    <span class="text-[var(--color-text-primary)]" data-field="soiree-subtitle">{{subtitle}}</span>
  </h1>

  <!-- Left: description (one paragraph per entry) -->
  <div class="absolute left-[78px] top-[300px] w-[820px] z-10 space-y-5 text-[18px] leading-[1.5] text-[var(--color-text-primary)]" data-field="soiree-description">
    {{#each description}}
    <p>{{this}}</p>
    {{/each}}
  </div>

  <!-- Tendencia logo, bottom (near text/image boundary) -->
  <div class="absolute bottom-9 left-[720px] z-10">
    <img src="assets/logo.png" alt="Tendencia Events & Travel" class="h-24">
  </div>

  <!-- Decorative arrow markers, bottom-left -->
  <div class="absolute bottom-12 left-16 z-10 flex items-center gap-6">
    <div class="flex">
      <div class="w-0 h-0 border-y-[20px] border-y-transparent border-l-[30px] border-l-[color:var(--color-text-primary)]"></div>
      <div class="w-0 h-0 border-y-[20px] border-y-transparent border-l-[30px] border-l-[color:var(--brand-accent)] -ml-2"></div>
    </div>
    <div class="w-0 h-0 border-y-[20px] border-y-transparent border-l-[30px] border-l-[color:var(--brand-secondary)]"></div>
    <div class="w-0 h-0 border-y-[20px] border-y-transparent border-l-[30px] border-l-[color:var(--brand-primary)]"></div>
  </div>

</div>
