<!-- Slide component: Idea box ("NOTRE BOÎTE A IDÉES") — centered hero image -->
<div class="slide relative w-[1920px] h-[1080px] overflow-hidden bg-[var(--color-background)]" style="font-family: var(--font-body);">

  <!-- Title -->
  <img src="assets/outline_colored.webp" alt="" class="absolute left-[78px] top-[140px] w-56 h-12 object-contain z-0">
  <h1 class="absolute left-[78px] top-[52px] z-10 text-7xl font-bold leading-[1.12]" style="font-family: var(--font-heading);">
    <span class="text-[var(--brand-accent)]">NOTRE BOÎTE</span><br>
    <span class="text-[var(--color-text-primary)]">A IDÉES</span>
  </h1>

  <!-- Section label, top-right -->
  <h2 class="absolute right-[64px] top-[46px] z-10 text-3xl font-normal leading-tight text-right text-[var(--color-text-secondary)]" style="font-family: var(--font-heading);">
    PRESTATIONS<br>EN SUS
  </h2>

  <!-- Centered hero image -->
  <img src="assets/box.png" alt="Boîte à idées" data-field="box-image"
       class="absolute z-10 h-[840px] w-auto object-contain"
       style="left: 50%; top: 54%; transform: translate(-50%, -50%);">

  <!-- Tendencia logo, bottom-left -->
  <div class="absolute bottom-10 left-10 z-20">
    <img src="assets/logo.png" alt="Tendencia Events & Travel" class="h-24">
  </div>

  <!-- Decorative arrow markers, bottom-right -->
  <div class="absolute bottom-16 right-20 z-20 flex items-center gap-5">
    <div class="flex">
      <div class="w-0 h-0 border-y-[20px] border-y-transparent border-l-[30px] border-l-[color:var(--color-text-primary)]"></div>
      <div class="w-0 h-0 border-y-[20px] border-y-transparent border-l-[30px] border-l-[color:var(--brand-accent)] -ml-2"></div>
    </div>
    <div class="w-0 h-0 border-y-[20px] border-y-transparent border-l-[30px] border-l-[color:var(--brand-secondary)]"></div>
    <div class="w-0 h-0 border-y-[20px] border-y-transparent border-l-[30px] border-l-[color:var(--brand-primary)]"></div>
  </div>

</div>
