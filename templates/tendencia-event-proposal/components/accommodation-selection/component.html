<!-- Slide component: Accommodation selection table ("NOTRE SÉLECTION HÉBERGEMENT") -->
<div class="slide relative w-[1920px] h-[1080px] overflow-hidden bg-[var(--color-background)]" style="font-family: var(--font-body);">

  <!-- Title -->
  <div class="absolute left-[78px] top-[50px] w-[600px] h-[3px] bg-[var(--color-text-primary)] z-10"></div>
  <img src="assets/outline_colored.webp" alt="" class="absolute left-[78px] top-[196px] w-56 h-12 object-contain z-0">
  <h1 class="absolute left-[78px] top-[68px] z-10 text-6xl font-bold leading-[1.05]" style="font-family: var(--font-heading);">
    <span class="text-[var(--brand-accent)]">NOTRE SÉLECTION</span><br>
    <span class="text-[var(--color-text-primary)]">HÉBERGEMENT</span>
  </h1>
  <!-- Bed accent icon beside the title -->
  <i class="ti ti-bed absolute left-[690px] top-[64px] z-10 text-[var(--brand-accent)] text-8xl"></i>

  <!-- Hotel selection table (one row per selected hotel) -->
  <div class="absolute left-[80px] top-[400px] z-10 w-[1780px] rounded-[22px] overflow-hidden border border-[var(--color-border)]">
    <table class="w-full table-fixed border-collapse">
      <colgroup>
        <col class="w-[380px]"><col class="w-[220px]"><col class="w-[340px]">
        <col class="w-[300px]"><col class="w-[320px]"><col class="w-[220px]">
      </colgroup>

      <thead>
        <tr class="bg-[var(--color-text-primary)] text-white text-[20px] font-bold tracking-[0.03em]" style="font-family: var(--font-heading);">
          <th class="py-[22px] px-[14px] border-r border-[var(--color-border)]"><span class="inline-flex items-center justify-center gap-3"><i class="ti ti-building-community text-[var(--brand-accent)] text-[26px]"></i>HÔTELS</span></th>
          <th class="py-[22px] px-[14px] border-r border-[var(--color-border)]"><span class="inline-flex items-center justify-center gap-3"><i class="ti ti-map-pin text-[var(--brand-accent)] text-[26px]"></i>VILLE</span></th>
          <th class="py-[22px] px-[14px] border-r border-[var(--color-border)]"><span class="inline-flex items-center justify-center gap-3"><i class="ti ti-map-2 text-[var(--brand-accent)] text-[26px]"></i>EMPLACEMENT</span></th>
          <th class="py-[22px] px-[14px] border-r border-[var(--color-border)]"><span class="inline-flex items-center justify-center gap-3"><i class="ti ti-star text-[var(--brand-accent)] text-[26px]"></i>CATÉGORIE</span></th>
          <th class="py-[22px] px-[14px] border-r border-[var(--color-border)]"><span class="inline-flex items-center justify-center gap-3"><i class="ti ti-bed text-[var(--brand-accent)] text-[26px]"></i>DISPONIBILITÉ</span></th>
          <th class="py-[22px] px-[14px]"><span class="inline-flex items-center justify-center gap-3"><i class="ti ti-discount-check text-[var(--brand-accent)] text-[26px]"></i>TENDENCIA RATES</span></th>
        </tr>
      </thead>

      <tbody>
        {{#each hotels}}
        <tr class="bg-[var(--color-surface)] text-[var(--color-text-primary)] border-t border-[var(--color-border)] align-middle">
          <td class="h-[168px] py-5 px-[18px] text-center border-r border-[var(--color-border)]">
            <span class="font-bold text-[26px] leading-[1.2]" style="font-family: var(--font-heading);" data-field="hotel-name">{{this.hotel.name}}</span>
          </td>
          <td class="h-[168px] py-5 px-[18px] text-center border-r border-[var(--color-border)]">
            <span class="font-bold text-[26px] tracking-[0.04em]" style="font-family: var(--font-heading);" data-field="city">{{this.city}}</span>
          </td>
          <td class="h-[168px] py-5 px-[18px] text-center border-r border-[var(--color-border)]">
            <span class="text-[24px] font-medium leading-[1.3]" data-field="location">{{this.location}}</span>
          </td>
          <td class="h-[168px] py-5 px-[18px] text-center border-r border-[var(--color-border)]">
            <span class="inline-flex gap-[6px] text-[34px] text-[var(--brand-accent)]" data-field="category">
              {{#each this.hotel.stars}}<i class="ti ti-star-filled"></i>{{/each}}
            </span>
          </td>
          <td class="h-[168px] py-5 px-[18px] text-center border-r border-[var(--color-border)]">
            <span class="text-[24px] font-medium leading-[1.3]" data-field="availability"><span class="underline">entre</span> singles &amp; twins</span>
          </td>
          <td class="h-[168px] py-5 px-[18px] text-center">
            <span class="inline-flex gap-1 text-[34px] text-[var(--brand-accent)]" data-field="tendencia-rate">
              <i class="ti ti-check"></i><i class="ti ti-check"></i><i class="ti ti-check"></i><i class="ti ti-check"></i>
            </span>
          </td>
        </tr>
        {{/each}}
      </tbody>
    </table>
  </div>

  <!-- Tendencia logo, bottom-left -->
  <div class="absolute bottom-10 left-10 z-10">
    <img src="assets/logo.png" alt="Tendencia Events & Travel" class="h-24">
  </div>

  <!-- Decorative arrow markers, bottom-right -->
  <div class="absolute bottom-16 right-20 z-10 flex items-center gap-5">
    <div class="flex">
      <div class="w-0 h-0 border-y-[20px] border-y-transparent border-l-[30px] border-l-[color:var(--color-text-primary)]"></div>
      <div class="w-0 h-0 border-y-[20px] border-y-transparent border-l-[30px] border-l-[color:var(--brand-accent)] -ml-2"></div>
    </div>
    <div class="w-0 h-0 border-y-[20px] border-y-transparent border-l-[30px] border-l-[color:var(--brand-secondary)]"></div>
    <div class="w-0 h-0 border-y-[20px] border-y-transparent border-l-[30px] border-l-[color:var(--brand-primary)]"></div>
  </div>

</div>
