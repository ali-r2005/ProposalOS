<!-- Slide component: Accommodation selection table ("NOTRE SÉLECTION HÉBERGEMENT") -->
<div class="slide relative w-[1920px] h-[1080px] overflow-hidden bg-[var(--color-background)]" style="font-family: var(--font-body);">

  <!-- Title -->
  <div class="absolute left-[78px] top-[50px] w-[600px] h-[3px] bg-[var(--color-text-primary)] z-10"></div>
  <div class="absolute left-[52px] top-[196px] w-40 h-16 bg-[var(--brand-accent)] z-0"></div>
  <h1 class="absolute left-[78px] top-[68px] z-10 text-6xl font-bold leading-[1.05]" style="font-family: var(--font-heading);">
    <span class="text-[var(--brand-accent)]">NOTRE SÉLECTION</span><br>
    <span class="text-[var(--color-text-primary)]">HÉBERGEMENT</span>
  </h1>
  <!-- Bed accent icon beside the title -->
  <i class="ti ti-bed absolute left-[690px] top-[64px] z-10 text-[var(--brand-accent)] text-8xl"></i>

  <!-- Hotel selection table (engine injects data rows) -->
  <div class="absolute left-[80px] top-[400px] z-10 rounded-[22px] overflow-hidden border border-[var(--color-border)]" data-field="hotel-list">
    <div class="grid grid-cols-[380px_220px_340px_300px_320px_220px]">

      <!-- Header -->
      <div class="flex items-center justify-center gap-3 py-[22px] px-[14px] text-center text-[20px] font-bold tracking-[0.03em] text-white bg-[var(--color-text-primary)] border-r border-[var(--color-border)]" style="font-family: var(--font-heading);"><i class="ti ti-building-community text-[var(--brand-accent)] text-[26px]"></i>HÔTELS</div>
      <div class="flex items-center justify-center gap-3 py-[22px] px-[14px] text-center text-[20px] font-bold tracking-[0.03em] text-white bg-[var(--color-text-primary)] border-r border-[var(--color-border)]" style="font-family: var(--font-heading);"><i class="ti ti-map-pin text-[var(--brand-accent)] text-[26px]"></i>VILLE</div>
      <div class="flex items-center justify-center gap-3 py-[22px] px-[14px] text-center text-[20px] font-bold tracking-[0.03em] text-white bg-[var(--color-text-primary)] border-r border-[var(--color-border)]" style="font-family: var(--font-heading);"><i class="ti ti-map-2 text-[var(--brand-accent)] text-[26px]"></i>EMPLACEMENT</div>
      <div class="flex items-center justify-center gap-3 py-[22px] px-[14px] text-center text-[20px] font-bold tracking-[0.03em] text-white bg-[var(--color-text-primary)] border-r border-[var(--color-border)]" style="font-family: var(--font-heading);"><i class="ti ti-star text-[var(--brand-accent)] text-[26px]"></i>CATÉGORIE</div>
      <div class="flex items-center justify-center gap-3 py-[22px] px-[14px] text-center text-[20px] font-bold tracking-[0.03em] text-white bg-[var(--color-text-primary)] border-r border-[var(--color-border)]" style="font-family: var(--font-heading);"><i class="ti ti-bed text-[var(--brand-accent)] text-[26px]"></i>DISPONIBILITÉ</div>
      <div class="flex items-center justify-center gap-3 py-[22px] px-[14px] text-center text-[20px] font-bold tracking-[0.03em] text-white bg-[var(--color-text-primary)]" style="font-family: var(--font-heading);"><i class="ti ti-discount-check text-[var(--brand-accent)] text-[26px]"></i>TENDENCIA RATES</div>

      <!-- Row 1 -->
      <div class="flex flex-col items-center justify-center text-center gap-[6px] min-h-[168px] py-5 px-[18px] bg-[var(--color-surface)] text-[var(--color-text-primary)] border-r border-[var(--color-border)]"><span class="font-bold text-[26px] leading-[1.2]" style="font-family: var(--font-heading);" data-field="hotel-name">HILTON HOUARA<br>RESORT &amp; SPA</span></div>
      <div class="flex flex-col items-center justify-center text-center gap-[6px] min-h-[168px] py-5 px-[18px] bg-[var(--color-surface)] text-[var(--color-text-primary)] border-r border-[var(--color-border)]"><span class="font-bold text-[26px] tracking-[0.04em]" style="font-family: var(--font-heading);" data-field="city">TANGER</span></div>
      <div class="flex flex-col items-center justify-center text-center gap-[6px] min-h-[168px] py-5 px-[18px] bg-[var(--color-surface)] text-[var(--color-text-primary)] border-r border-[var(--color-border)]"><span class="text-[24px] font-medium leading-[1.3]" data-field="location">ROUTE D'ASILAH</span></div>
      <div class="flex flex-col items-center justify-center text-center gap-[6px] min-h-[168px] py-5 px-[18px] bg-[var(--color-surface)] text-[var(--color-text-primary)] border-r border-[var(--color-border)]">
        <span class="flex gap-[6px] text-[34px] text-[var(--brand-accent)]" data-field="category">
          <i class="ti ti-star-filled"></i><i class="ti ti-star-filled"></i><i class="ti ti-star-filled"></i><i class="ti ti-star-filled"></i><i class="ti ti-star-filled"></i>
        </span>
      </div>
      <div class="flex flex-col items-center justify-center text-center gap-[6px] min-h-[168px] py-5 px-[18px] bg-[var(--color-surface)] text-[var(--color-text-primary)] border-r border-[var(--color-border)]"><span class="text-[24px] font-medium leading-[1.3]" data-field="availability"><span class="underline">entre</span> singles &amp; twins</span></div>
      <div class="flex flex-col items-center justify-center text-center gap-[6px] min-h-[168px] py-5 px-[18px] bg-[var(--color-surface)] text-[var(--color-text-primary)]">
        <span class="flex gap-1 text-[34px] text-[var(--brand-accent)]" data-field="tendencia-rate">
          <i class="ti ti-check"></i><i class="ti ti-check"></i><i class="ti ti-check"></i><i class="ti ti-check"></i>
        </span>
      </div>

    </div>
  </div>

  <!-- Tendencia logo, bottom-left -->
  <div class="absolute bottom-10 left-10 z-10">
    <img src="assets/logo.png" alt="Tendencia Events & Travel" class="h-24">
  </div>

  <!-- Decorative arrow markers, bottom-right -->
  <div class="absolute bottom-16 right-20 z-10 flex items-center gap-5">
    <div class="flex">
      <div class="w-0 h-0 border-y-[20px] border-y-transparent border-l-[30px] border-l-[color:var(--color-text-primary)]"></div>
      <div class="w-0 h-0 border-y-[20px] border-y-transparent border-l-[30px] border-l-[color:var(--brand-accent)] -ml-2"></div>
    </div>
    <div class="w-0 h-0 border-y-[20px] border-y-transparent border-l-[30px] border-l-[color:var(--brand-secondary)]"></div>
    <div class="w-0 h-0 border-y-[20px] border-y-transparent border-l-[30px] border-l-[color:var(--brand-primary)]"></div>
  </div>

</div>
