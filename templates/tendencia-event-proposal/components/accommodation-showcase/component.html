<!-- Slide component: Accommodation showcase ("OPTION N — Hébergement") — one slide per selected hotel (repeat over `hotels`) -->
<div class="slide relative w-[1920px] h-[1080px] overflow-hidden bg-[var(--color-frame)]" style="font-family: var(--font-body);">
  <div class="grid w-[1920px] h-[1080px] bg-[var(--color-frame)] gap-[6px]"
       style="grid-template-columns: 560px 440px 470px 432px; grid-template-rows: 384px 288px 396px; grid-template-areas: 'left lobby laptop right' 'left lobby bed right' 'left stars bed text';">

    <!-- LEFT identity panel -->
    <div class="relative bg-[var(--color-background)] overflow-hidden" style="grid-area: left;">
      <!-- arrow markers, top-left -->
      <div class="absolute left-[52px] top-[56px] flex items-center gap-5">
        <div class="flex">
          <div class="w-0 h-0 border-y-[18px] border-y-transparent border-l-[28px] border-l-[color:var(--color-text-primary)]"></div>
          <div class="w-0 h-0 border-y-[18px] border-y-transparent border-l-[28px] border-l-[color:var(--brand-accent)] -ml-2"></div>
        </div>
        <div class="w-0 h-0 border-y-[18px] border-y-transparent border-l-[28px] border-l-[color:var(--brand-secondary)]"></div>
        <div class="w-0 h-0 border-y-[18px] border-y-transparent border-l-[28px] border-l-[color:var(--brand-primary)]"></div>
      </div>

      <!-- title block -->
      <div class="absolute left-[52px] top-[210px]">
        <h1 class="text-[52px] leading-none font-bold text-[var(--brand-accent)] tracking-[0.22em]" style="font-family: var(--font-heading);">OPTION {{option}}</h1>
        <h2 class="text-[46px] leading-none mt-4 font-bold text-[var(--brand-accent)] tracking-[0.22em]" style="font-family: var(--font-heading);" data-field="option-label">Hébergement</h2>
        <img src="assets/outline_accent.webp" alt="" class="w-80 h-30 object-contain mt-5">
      </div>

      <!-- Tendencia logo -->
      <img src="assets/logo.png" alt="Tendencia Events & Travel" class="absolute left-[52px] bottom-[70px] h-40 w-auto">
    </div>

    <!-- LOBBY image (placeholder) -->
    <div class="bg-[var(--color-background)] overflow-hidden" style="grid-area: lobby;">
      <img class="w-full h-full object-cover block" src="{{#if images.[0]}}{{images.[0]}}{{else}}assets/placeholder-image.svg{{/if}}" alt="{{hotel.name}}" data-field="photo-lobby">
    </div>

    <!-- Website link cell -->
    <div class="bg-[var(--color-background)] overflow-hidden flex flex-col items-center justify-center text-center px-8 gap-6" style="grid-area: laptop;">
      <i class="ti ti-device-laptop text-[110px] text-[var(--color-text-primary)]"></i>
      <a class="text-[var(--brand-primary)] underline text-[19px] leading-snug break-all" href="{{[hotel-url]}}" data-field="hotel-url">{{[hotel-url]}}</a>
    </div>

    <!-- RIGHT image (placeholder) -->
    <div class="bg-[var(--color-background)] overflow-hidden" style="grid-area: right;">
      <img class="w-full h-full object-cover block" src="{{#if images.[1]}}{{images.[1]}}{{else}}assets/placeholder-image.svg{{/if}}" alt="{{hotel.name}}" data-field="photo-ballroom">
    </div>

    <!-- BEDROOM image (placeholder) -->
    <div class="bg-[var(--color-background)] overflow-hidden" style="grid-area: bed;">
      <img class="w-full h-full object-cover block" src="{{#if images.[2]}}{{images.[2]}}{{else}}assets/placeholder-image.svg{{/if}}" alt="{{hotel.name}}" data-field="photo-room">
    </div>

    <!-- Stars + hotel name -->
    <div class="bg-[var(--color-background)] overflow-hidden flex flex-col items-center justify-center gap-6" style="grid-area: stars;">
      <div class="flex gap-2 text-[46px] text-[var(--brand-accent)]" data-field="category">
        {{#each hotel.stars}}<i class="ti ti-star-filled"></i>{{/each}}
      </div>
      <p class="text-[26px] tracking-wide text-[var(--color-text-primary)]" style="font-family: var(--font-heading);" data-field="hotel-name">{{hotel.name}}</p>
    </div>

    <!-- Description -->
    <div class="bg-[var(--color-background)] overflow-hidden flex items-center px-9 py-6" style="grid-area: text;">
      <p class="text-[19px] leading-relaxed text-[var(--color-text-primary)]" data-field="hotel-description">
        {{description}}
      </p>
    </div>

  </div>
</div>
