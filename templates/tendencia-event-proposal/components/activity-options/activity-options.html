<!-- Slide component: Team building & tourism options ("TEAM BUILDING & TOURISME OPTIONS") — green-themed -->
<div class="slide relative w-[1920px] h-[1080px] overflow-hidden bg-[var(--color-background)]" style="font-family: var(--font-body);">

  <!-- Zigzag chevron pattern, right side (charcoal / green / light-gray) -->
  <svg class="absolute inset-0 z-0" width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="none">
    <polyline fill="none" stroke-width="160" stroke-linejoin="miter" stroke="var(--color-border)"
      points="1710,-240 1810,-120 1710,0 1810,120 1710,240 1810,360 1710,480 1810,600 1710,720 1810,840 1710,960 1810,1080 1710,1200 1810,1320" />
    <polyline fill="none" stroke-width="160" stroke-linejoin="miter" stroke="var(--brand-secondary)"
      points="1480,-240 1580,-120 1480,0 1580,120 1480,240 1580,360 1480,480 1580,600 1480,720 1580,840 1480,960 1580,1080 1480,1200 1580,1320" />
    <polyline fill="none" stroke-width="160" stroke-linejoin="miter" stroke="var(--color-text-primary)"
      points="1250,-240 1350,-120 1250,0 1350,120 1250,240 1350,360 1250,480 1350,600 1250,720 1350,840 1250,960 1350,1080 1250,1200 1350,1320" />
  </svg>

  <!-- Title -->
  <div class="absolute left-[78px] top-[42px] w-[600px] h-[3px] bg-[var(--color-text-primary)] z-10"></div>
  <div class="absolute left-[52px] top-[186px] w-40 h-16 bg-[var(--brand-secondary)] z-0"></div>
  <h1 class="absolute left-[78px] top-[58px] z-10 text-6xl font-bold leading-[1.05]" style="font-family: var(--font-heading);">
    <span class="text-[var(--brand-secondary)]">TEAM BUILDING</span> <span class="text-[var(--color-text-primary)]">&amp;</span><br>
    <span class="text-[var(--color-text-primary)]">TOURISME OPTIONS</span>
  </h1>
  <!-- People accent icon beside the title -->
  <i class="ti ti-users-group absolute left-[680px] top-[60px] z-10 text-[var(--brand-secondary)] text-8xl"></i>

  <!-- Options list -->
  <div class="absolute left-[90px] top-[340px] w-[960px] z-10 space-y-14">

    <div data-field="option-indoor">
      <p class="text-[32px] font-bold leading-[1.3] text-[var(--color-text-primary)]" style="font-family: var(--font-heading);"><span class="text-[var(--brand-secondary)]">•</span> Team Building Indoor/<span class="underline">collaboratif</span> :</p>
      <p class="text-[32px] font-bold uppercase leading-[1.35] mt-2 text-[var(--color-text-primary)]" style="font-family: var(--font-heading);">ATLAS ANIMATE, BLOOM AS ONE &gt;&gt; CRÉER &amp; DYNAMISER</p>
    </div>

    <div data-field="option-outdoor">
      <p class="text-[32px] font-bold leading-[1.3] text-[var(--color-text-primary)]" style="font-family: var(--font-heading);"><span class="text-[var(--brand-secondary)]">•</span> Team Building Outdoor/<span class="underline">compétitif</span> :</p>
      <p class="text-[32px] font-bold uppercase leading-[1.35] mt-2 text-[var(--color-text-primary)]" style="font-family: var(--font-heading);">TANGER ENIGMA, ATLAS SPY MISSION &gt;&gt; EXPLORER &amp; CHALLENGER.</p>
    </div>

  </div>

  <!-- Tendencia logo, bottom-left -->
  <div class="absolute bottom-10 left-10 z-10">
    <img src="assets/logo.png" alt="Tendencia Events & Travel" class="h-24">
  </div>

  <!-- Decorative arrow markers, bottom-right -->
  <div class="absolute bottom-16 right-20 z-10 flex items-center gap-5">
    <div class="flex">
      <div class="w-0 h-0 border-y-[20px] border-y-transparent border-l-[30px] border-l-[color:var(--color-text-primary)]"></div>
      <div class="w-0 h-0 border-y-[20px] border-y-transparent border-l-[30px] border-l-[color:var(--brand-accent)] -ml-2"></div>
    </div>
    <div class="w-0 h-0 border-y-[20px] border-y-transparent border-l-[30px] border-l-[color:var(--brand-secondary)]"></div>
    <div class="w-0 h-0 border-y-[20px] border-y-transparent border-l-[30px] border-l-[color:var(--brand-primary)]"></div>
  </div>

</div>
